- spec:
    name: write_relative_path
    description: relative path from working directory
    parameters:
      type: object
      properties:
        filename:
          type: string
          description: Name of file to write
        content:
          type: string
          description: Content to write to file
      required:
      - filename
      - content
  function:
    type: write_file
    path: "{{ filename }}"
    content: "{{ content }}"

- spec:
    name: write_absolute_path
    description: Write file with absolute path
    parameters:
      type: object
      properties:
        filepath:
          type: string
          description: Absolute path to file
        content:
          type: string
          description: Content to write
      required:
      - filepath
      - content
  function:
    type: write_file
    path: "{{ filepath }}"
    content: "{{ content }}"

- spec:
    name: write_with_custom_allow_dir
    description: Write file to custom allowed directory
    parameters:
      type: object
      properties:
        filepath:
          type: string
          description: Path to file
        content:
          type: string
          description: Content to write
      required:
      - filepath
      - content
  function:
    type: write_file
    path: "{{ filepath }}"
    content: "{{ content }}"
    allow_dir:
    - "/tmp"

- spec:
    name: write_unicode_file
    description: Write file with unicode content
    parameters:
      type: object
      properties:
        filename:
          type: string
          description: Name of file to write
        content:
          type: string
          description: Unicode content to write
      required:
      - filename
      - content
  function:
    type: write_file
    path: "{{ filename }}"
    content: "{{ content }}"

- spec:
    name: write_empty_file
    description: Write empty file
    parameters:
      type: object
      properties:
        filename:
          type: string
          description: Name of file to write
        content:
          type: string
          description: Content to write
          default: ""
      required:
      - filename
  function:
    type: write_file
    path: "{{ filename }}"
    content: "{{ content }}"

- spec:
    name: write_multiline_file
    description: Write file with multiline content
    parameters:
      type: object
      properties:
        filename:
          type: string
          description: Name of file to write
        content:
          type: string
          description: Multiline content to write
      required:
      - filename
      - content
  function:
    type: write_file
    path: "{{ filename }}"
    content: "{{ content }}"
